name: Daily Whisky News

# 매일 KST 오전 9시(UTC 00:00) + 오후 9시(UTC 12:00) 신규 위스키 뉴스 검색
# 실제 위스키 뉴스가 있을 때만 기사 생성 (없으면 조용히 종료)
on:
  schedule:
    - cron: '0 0 * * *'   # KST 오전 9시
    - cron: '0 12 * * *'  # KST 오후 9시
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  check-and-post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Search and generate whisky news article (only if news exists)
        run: npm run generate:news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Commit and push (only if article was created)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/lib/data.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "Whisky news update [$(date +'%Y-%m-%d %H:%M')]" && git pull --rebase origin main && git push)

      - name: Notify result
        if: success()
        run: echo "Whisky news check completed. Article added if news was found."

      - name: Notify failure
        if: failure()
        run: |
          echo "FAILED: Whisky news generation error!"
          exit 1
