name: "[DEPRECATED] Generate Daily Whisky Article"

# 이 워크플로우는 daily-magazine.yml 과 daily-news.yml 로 분리되었습니다.
# 스케줄은 비활성화하고 수동 실행만 허용합니다.
on:
  # schedule:
  #   - cron: '0 0,12 * * *'  # 비활성화됨
  workflow_dispatch:  # 수동 실행 (레거시 호환용)

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate daily content (Article & Whiskies)
        run: |
          npm run generate:article
          npm run generate:whiskies
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/lib/data.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Add daily whisky article [$(date +'%Y-%m-%d')]" && git pull --rebase origin main && git push)
      
      - name: Notify completion
        if: success()
        run: echo "✅ Daily article generated successfully!"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Daily article generation FAILED!"
          echo "Please check the logs above for the error details."
          exit 1
