name: Generate Daily Whisky Article

# 매일 자정(한국 시간 오전 9시)에 자동으로 새 기사 생성
on:
  schedule:
    - cron: '0 0,12 * * *'  # 한국 시간 오전 9시(00:00 UTC) 및 오후 9시(12:00 UTC)
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  generate-content:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate daily content (Article & Whiskies)
        run: |
          npm run generate:article
          npm run generate:whiskies
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/lib/data.ts
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Add daily whisky article [$(date +'%Y-%m-%d')]" && git pull --rebase origin main && git push)
      
      - name: Notify completion
        if: success()
        run: echo "✅ Daily article generated successfully!"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Daily article generation FAILED!"
          echo "Please check the logs above for the error details."
          exit 1
